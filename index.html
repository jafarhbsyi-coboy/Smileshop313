<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Datang Di supermarket online/Smileshop313</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* HEADER */
.header {
    background: #ff5722;
    padding: 10px;
    display: flex;
    align-items: center;
}

.logo {
    color: white;
    font-size: 20px;
    font-weight: bold;
}

.search {
    flex: 1;
    margin-left: 10px;
}

.search input {
    width: 100%;
    padding: 8px;
    border-radius: 5px;
    border: none;
}

/* BANNER */
.banner {
    background: orange;
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 18px;
}

/* GRID PRODUK */
.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
}

/* CARD */
.produk {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
}

.produk img {
    width: 100%;
}

.diskon {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    color: white;
    padding: 3px 6px;
    font-size: 12px;
    border-radius: 5px;
}

.info {
    padding: 10px;
}

.harga {
    color: #ff5722;
    font-weight: bold;
}

.rating {
    font-size: 12px;
    color: #999;
}

.btn {
    background: #ff5722;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    border-radius: 5px;
    margin-top: 5px;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">Smileshop313</div>
    <div class="search">
        <input type="text" placeholder="Cari produk...">
    </div>
</div>

<!-- BANNER -->
<div class="banner">
    🔥 Promo
