<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kopi Jahe Mantap</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f5f5;
        text-align: center;
    }

    header {
        background: #6b3e26;
        color: white;
        padding: 20px;
    }

    .container {
        padding: 20px;
    }

    .product {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 350px;
        margin: auto;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .product img {
        width: 100%;
        border-radius: 10px;
    }

    .price {
        font-size: 22px;
        color: #e67e22;
        margin: 10px 0;
    }

    .btn {
        display: block;
        margin: 10px auto;
        padding: 12px;
        text-decoration: none;
        color: white;
        border-radius: 5px;
        width: 80%;
        font-weight: bold;
    }

    .shopee {
        background: #ee4d2d;
    }

    .tokopedia {
        background: #42b549;
    }

    footer {
        margin-top: 20px;
        padding: 10px;
        background: #ddd;
    }
</style>

</head>
<body>

<header>
    <h1>☕ Kopi Jahe Mantap</h1>
    <p>Hangat, Nikmat, Bikin Segar!</p>
</header>

<div class="container">
    <div class="product">
        
        <!-- GANTI GAMBAR INI DENGAN FOTO PRODUK KAMU -->
        <img src="https://i.imgur.com/3ZQ3Z3Z.png" alt="Kopi Jahe Sachet">

        <h2>Kopi Jahe Sachet</h2>
        <p>Minuman kopi jahe hangat, cocok untuk kesehatan dan stamina.</p>

        <div class="price">Rp 5.000</div>

        <!-- GANTI LINK DIBAWAH DENGAN TOKO KAMU -->
        <a href="https://shopee.co.id/" target="_blank" class="btn shopee">
            Beli di Shopee
        </a>

        <a href="https://www.tokopedia.com/" target="_blank" class="btn tokopedia">
            Beli di Tokopedia
        </a>

    </div>
</div>

<footer>
    <p>© 2026 Kopi Jahe Mantap</p>
</footer>

</body>
</html>
