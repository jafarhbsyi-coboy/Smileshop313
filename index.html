<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Smileshop313</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .produk {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            display: inline-block;
            width: 200px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .produk img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }
    </style>
</head>
<body>

<header>
    <h1>Smileshop313</h1>
    <p>Toko Online Modern 🚀</p>
</header>

<div class="container">

    <div class="produk">
        <img src="https://via.placeholder.com/200" alt="Produk">
        <h3>Produk 1</h3>
        <p>Rp 50.000</p>
        <button>Beli</button>
    </div>

    <div class="produk">
        <img src="https://via.placeholder.com/200" alt="Produk">
        <h3>Produk 2</h3>
        <p>Rp 75.000</p>
        <button>Beli</button>
    </div>

    <div class="produk">
        <img src="https://via.placeholder.com/200" alt="Produk">
        <h3>Produk 3</h3>
        <p>Rp 100.000</p>
        <button>Beli</button>
    </div>

</div>

</body>
</html>
